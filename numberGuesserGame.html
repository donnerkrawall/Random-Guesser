<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing Lab</title>

<style>
</style>
<style>

#body {
    background-color: #b6b6b6;
    text-align: center;
    font-size: 150%;
    font-family: Arial, Helvetica, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 36px;
    box-sizing: border-box;
}

#isCorrect {
    color: rgb(0, 200, 0);
    background-color: rgb(110, 110, 110);
    font-size: 220%;
    padding: 8px 14px;
    border-radius: 6px;
}

.controls {
    display: flex;
    gap: 12px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
}

#thisAreYouTryes {
    font-size: 120%;
}

#b2:hover, #submit:hover {
    background-color: #008206;
    border: solid 3px;
}

#submit, #b2 {
    padding: 12px 24px;
    font-size: 18px;
    background-color: #4CAF50;
    color: white;
    cursor: pointer;
    border: none;
    border-radius: 6px;
}

#input1 {
    padding: 10px 20px;
    font-size: 18px;
    width: 220px;
}

</style>
</style>

<script>
 

</script>
</head>


<body id="body">
    <h1 id="h1">Number Guessing Game</h1>
    <p>Guess a random Number between 0 and 100</p>

    <div class="controls">
        <input id="input1" type="number" min="0" max="100" placeholder="0-100">
        <button id="submit" onclick="run()">Submit Number</button>
        <button id="b2" onclick='location.href="index.html"'>Back to Lobby</button>
    </div>

    <p id="isCorrect"></p>
    <p id="thisAreYouTryes"></p>

<script> 
let num = Math.floor(Math.random() * 100);
let howManyTimesYouTryed = 0;


function run() {


let value = document.getElementById("input1").value;  
//document.getElementById("isCorrect").textContent
if ( value < 1 || value > 100) {alert("Please type a Number between 0 and 100 in")}
else {

if (value > num) { alert("Your Number it so high");  howManyTimesYouTryed = howManyTimesYouTryed + 1; }
else if  (value < num) { alert("Your Number it so low"); howManyTimesYouTryed = howManyTimesYouTryed + 1; }
else {document.getElementById("isCorrect").textContent = "CONGRATS, YOUR RIGHT"} 

}
document.getElementById("thisAreYouTryes").innerHTML = "You have tried " + howManyTimesYouTryed + " times";
}


</script>


</body>


</html>
