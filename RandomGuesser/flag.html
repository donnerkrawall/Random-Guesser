<script>

let src = ""; // Global variable

function newFlag() {

let num = Math.random();
let option1 = document.getElementById("option1");
let option2 = document.getElementById("option2");  
let option3 = document.getElementById("option3");
let option4 = document.getElementById("option4");

if ( num < 0.25) {
src = "german.png"; option1.innerHTML = "Russian"; option2.innerHTML = "England"; option3.innerHTML = "America"; option4.innerHTML = "Germany";
}
else if ( num < 0.5) {
src = "amerika.png"; option1.innerHTML = "America"; option2.innerHTML = "Russian"; option3.innerHTML = "Germany"; option4.innerHTML = "England";
}
else if ( num < 0.75) {
src = "russian.png"; option1.innerHTML = "Germany"; option2.innerHTML = "England"; option3.innerHTML = "Russian"; option4.innerHTML = "America";
}
else {
src = "uk.png"; option1.innerHTML = "America"; option2.innerHTML = "Germany"; option3.innerHTML = "England"; option4.innerHTML = "Russian";
}

document.getElementById("img").src = src;
chooseOption();
}

function chooseOption() {
 if ( src == "german.png") {
    option1.onclick = function() {alert("You are wrong");}
    option2.onclick = function() {alert("You are wrong");}
    option3.onclick = function() {alert("You are wrong");}
    option4.onclick = function() {alert("You are right");}

}
else if ( src == "amerika.png") {
    option1.onclick = function() {alert("You are right");}
    option2.onclick = function() {alert("You are wrong");}
    option3.onclick = function() {alert("You are wrong");}
    option4.onclick = function() {alert("You are wrong");}
}
else if ( src == "russian.png") {
    option1.onclick = function() {alert("You are wrong");}
    option2.onclick = function() {alert("You are wrong");}
    option3.onclick = function() {alert("You are right");}
    option4.onclick = function() {alert("You are wrong");}
}
else if ( src == "uk.png") {
    option1.onclick = function() {alert("You are wrong");}
    option2.onclick = function() {alert("You are wrong");}
    option3.onclick = function() {alert("You are right");}
    option4.onclick = function() {alert("You are wrong");}
}   
}
</script>
