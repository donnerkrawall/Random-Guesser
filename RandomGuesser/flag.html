}

<style>
    #body {
        background-color: #b6b6b6;
        font-family: Arial, Helvetica, sans-serif;
        min-height: 100vh;
        box-sizing: border-box;
        padding: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .container {
        width: 100%;
        max-width: 1100px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        align-items: stretch;
    }

    .top-row {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
    }

    .top-row .controls {
        display: flex;
        gap: 10px;
        align-items: center;
    }

    #b1, #b2 {
        padding: 12px 18px;
        font-size: 16px;
        background-color: #4CAF50;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }

    #b1:hover, #b2:hover { background-color: #008206; }

    .game-area {
        display: flex;
        gap: 24px;
        align-items: flex-start;
        justify-content: center;
        flex-wrap: wrap;
    }

    .img-wrapper {
        flex: 0 0 420px;
    }

    #img {
        width: 100%;
        height: 260px;
        object-fit: cover;
        border: 3px solid #000;
        border-radius: 6px;
        background: #fff;
       
    }

    .options {
        display: grid;
        grid-template-columns: repeat(2, minmax(160px, 1fr));
        gap: 12px;
        min-width: 320px;
        align-self: center;
    }

    #option1, #option2, #option3, #option4 {
        padding: 12px 10px;
        font-size: 18px;
        border: 2px solid rgb(129,129,129);
        border-radius: 6px;
        background: #fff;
        cursor: pointer;
        text-align: center;
    }

    #option1:hover, #option2:hover, #option3:hover, #option4:hover {
        background-color: #f0f0f0;
        border-width: 3px;
    }

    .info {
        display:flex;
        gap:18px;
        flex-wrap:wrap;
        align-items:center;
        justify-content:flex-start;
    }

    #value { font-size: 20px; font-weight:600; }
    #totalRight, #totalWrong, #total, #h3 { margin: 0; font-size: 16px; }
    #reminder { margin-top: 6px; font-size: 14px; }

    @media (max-width:720px){
        .game-area{ flex-direction: column; align-items:center; }
        .img-wrapper{ width:100%; max-width:420px; }

    }

</style>
